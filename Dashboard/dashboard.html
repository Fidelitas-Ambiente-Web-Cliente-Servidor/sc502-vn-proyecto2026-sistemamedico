<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="./dashboard_styles.css">
  <script src="dashboard_scripts.js"></script>
</head>

<body>

  <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm px-4">
    <div class="container-fluid">

      <div class="d-flex align-items-center">
        <i class="bi bi-heart-pulse-fill text-primary fs-4 me-2"></i>
        <span class="fw-bold text-primary fs-5">MediControl</span>
      </div>

      <div class="mx-auto">
        <ul class="navbar-nav flex-row gap-4">
          <li class="nav-item">
            <a class="nav-link active text-primary" href="#">Dashboard</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-primary" href="#">Recordatorios</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-primary" href="#">Agenda</a>
          </li>
        </ul>
      </div>

      <div class="d-flex gap-2">
        <button class="btn btn-primary btn-sm">Perfil</button>
        <button class="btn btn-outline-primary btn-sm">Salir</button>
      </div>

    </div>
  </nav>

  <div class="container-fluid mt-4 px-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
      <h3 class="text-primary">Dashboard</h3>
      <span class="fw-semibold">Bienvenido Usuario</span>
    </div>

    <!-- Secciones -->
    <div class="row g-5">

      <!-- Recordatorios -->
      <div class="col-md-6">
        <h4 class="text-primary mb-3">Recordatorios</h4>
        <div class="custom-card"></div>
      </div>

      <!-- Agenda -->
      <div class="col-md-6">
        <h4 class="text-primary mb-3">Agenda</h4>
        <div class="custom-card"></div>
      </div>

    </div>

  </div>
</body>

</html>
