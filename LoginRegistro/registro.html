<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./diseño.css">
    <script src="loginscript.js"></script> 

</head>
<body>
    <i class="bi bi-calendar-heart-fill"></i>
    <h1>MediControl</h1>
    <p>Regístrate para gestionar tus citas médicas</p>

    <form id="formulario_registro" action="?" method="post" novalidate>
  <div class="mb-3">
    <label for="nombre" class="form-label">Nombre completo</label>
    <input type="text" class="form-control" id="nombre">
  </div>
  <div class="mb-3">
    <label for="email" class="form-label">Correo Electrónico</label>
    <input type="email" class="form-control" id="email">
  </div>
  <div class="mb-3">
    <label for="password" class="form-label">Contraseña</label>
    <input type="password" class="form-control" id="contraseña">
  </div>

    <div class="mb-3">
    <label for="numero" class="form-label">Número de teléfono</label>
    <input type="tel" class="form-control" id="numero">
  </div>

    <div class="mb-3">
    <label for="fechaNacimiento" class="form-label">Fecha de Nacimiento</label>
    <input type="date" class="form-control" id="fechaNacimiento">
  </div>

  <button type="submit" class="btn btn-primary">Registrarse</button>
</form>
<p id="mensaje_registro" style="display:none;"></p>
<p class="text-center mt-3">
  ¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a>
</p>
</body>
</html>
